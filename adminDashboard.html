<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Product Dashboard</title>
  <link rel="stylesheet" href="adminDashboard.css"/>
</head>
<body>
     <div class="buttons">

    <div class="back-btn-container">
    <button onclick="window.location.href='index.html'" class="back-btn">
  ← Back 
</button>
</div>

  <h1>Products Dashboard</h1>

  

  <div class="add-product-container">
  <button class="add-product-btn" onclick="addProduct()">+ Add Product</button>
</div>
</div>

  <div class="analytics" id="analyticsPanel">
    <div class="metric">
      <div class="label">Total Orders</div>
      <div class="value" id="m-total">--</div>
    </div>
    <div class="metric">
      <div class="label">Paid Orders</div>
      <div class="value" id="m-paid">--</div>
    </div>
    <div class="metric">
      <div class="label">Pending Orders</div>
      <div class="value" id="m-pending">--</div>
    </div>
    <div class="metric">
      <div class="label">Revenue (Rs)</div>
      <div class="value" id="m-revenue">--</div>
    </div>
    <div class="metric">
      <div class="label">Avg Ticket</div>
      <div class="value" id="m-avg">--</div>
    </div>
    <div class="metric wide">
      <div class="label">Top Products</div>
      <ul id="top-products"></ul>
    </div>
    <div class="metric wide info" id="auth-hint" style="display:none">
      <div>Login required</div>
      <p>Please sign in on the admin login page to view analytics.</p>
      <button onclick="window.location.href='adminAuth.html'" class="btn">Go to login</button>
    </div>
  </div>

  <div class="dashboard-container">
    <table id="productTable">
      <thead>
        <tr>
          <th>Image</th>
          <th>Product Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="productTableBody">
        <!-- Products will be loaded here -->
      </tbody>
    </table>
  </div>

    <script src="adminDashboard.js"></script>
</body>
</html>
