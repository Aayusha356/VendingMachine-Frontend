<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Checkout</title>
  <link rel="stylesheet" href="checkout.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Back & Home buttons -->
  <div class="back-btn" onclick="history.back()">
    <i class="fas fa-arrow-left"></i>
  </div>
  <button class="home-btn" onclick="window.location.href='index.html'">Home</button>

  <!-- Checkout Container -->
  <div class="container">
    <div class="qr-box">
      <p>Order Id: <span id="order-id"></span></p>
      <p class="pill" id="product-name">Loading product...</p>
      <p>We Accept</p>
      <p>SmartPay</p>

      <div class="amount" id="amount">Nrs. 0</div>
      <p id="qty-label" style="color:#444;font-weight:600;margin-top:6px;">Qty: 1</p>
      <div id="message" class="inline-alert" style="display:none"></div>
      <p>Scan the QR to pay. Dispense will start automatically after successful payment.</p>

      <div class="qr">
        <img id="qr-img" src="photos/qr-placeholder.png" width="200" alt="QR Code">
      </div>
    </div>

    <!-- SUCCESS SCREEN -->
<div id="success-screen" class="success-overlay">
    <div class="success-card">
        <img src="photos/sucessgif.gif" class="success-gif" alt="Success">
        <h2>Payment Successful!</h2>
        <p>Thank you! Dispensing will begin shortly.</p>
        <button onclick="goHome()" class="btn-home">Return Home</button>
    </div>
</div>

  </div>
  <script src="checkout.js"></script>
</body>
</html>
